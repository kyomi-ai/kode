<!DOCTYPE html>
<html>
<head><title>kode spike</title></head>
<body>
<h2>editor-core test</h2>
<pre id="editor-result"></pre>
<h2>arborium benchmarks (shared highlighter)</h2>
<pre id="highlight-result"></pre>
<script type="module">
import init, { test_editor_core, highlight } from './pkg/kode_spike.js';
await init();

document.getElementById('editor-result').textContent = test_editor_core();

const sql = `SELECT u.id, u.name, COUNT(o.id) AS order_count\nFROM users u\nLEFT JOIN orders o ON o.user_id = u.id\nWHERE u.created_at >= '2025-01-01'\nGROUP BY u.id\nORDER BY order_count DESC\nLIMIT 100;`;
const yaml = `dashboard:\n  title: Revenue\n  panels:\n    - type: chart\n      query: |\n        SELECT date, SUM(amount)\n        FROM sales\n        GROUP BY date`;
const md = `# Dashboard Docs\n\nThis tracks **monthly revenue**.\n\n## Data Sources\n\n- production-bq\n- analytics-ch\n\n\`\`\`sql\nSELECT region, SUM(revenue)\nFROM sales\nGROUP BY region\n\`\`\`\n\n> Note: refreshes every 5m.`;

function bench(code, lang, runs) {
  const times = [];
  for (let i = 0; i < runs; i++) {
    const t = performance.now();
    highlight(code, lang);
    times.push(performance.now() - t);
  }
  return times;
}

const results = [];
for (const [name, code, lang] of [['SQL', sql, 'sql'], ['YAML', yaml, 'yaml'], ['Markdown', md, 'markdown']]) {
  const times = bench(code, lang, 10);
  const first = times[0].toFixed(1);
  const rest = times.slice(1);
  const avg = (rest.reduce((a, b) => a + b, 0) / rest.length).toFixed(2);
  const min = Math.min(...rest).toFixed(2);
  results.push(`${name}: first=${first}ms, avg=${avg}ms, min=${min}ms (9 runs after first)`);
}

document.getElementById('highlight-result').textContent = results.join('\n');
</script>
</body>
</html>
