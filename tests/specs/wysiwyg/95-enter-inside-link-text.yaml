name: "Enter inside [link text](url) — should split or escape link correctly"
scenario: "95-enter-inside-link-text"
editor: wysiwyg
tags: [enter, links, formatting, adversarial, newline]
description: >
  Pressing Enter inside link text should either split the link correctly or
  escape it without leaving broken markdown syntax visible.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - no_broken_link_syntax: true
    - no_raw_markdown_markers: true
    - no_visual_artifacts: true
