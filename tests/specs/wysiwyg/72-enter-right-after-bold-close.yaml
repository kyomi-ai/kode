name: "Enter right after ** closing marker — new line should not inherit bold"
scenario: "72-enter-right-after-bold-close"
editor: wysiwyg
tags: [enter, bold, formatting-boundary, adversarial, newline]
description: >
  Pressing Enter right after the closing ** marker should create a new line
  where subsequently typed text is normal weight, not bold.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - new_line_text_is_normal_weight: true
    - no_raw_markdown_markers: true
    - no_visual_artifacts: true
