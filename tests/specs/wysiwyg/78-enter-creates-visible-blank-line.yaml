name: "Enter twice — blank line between paragraphs should be visible, not collapsed"
scenario: "78-enter-creates-visible-blank-line"
editor: wysiwyg
tags: [enter, blank-line, spacing, newline]
description: >
  Pressing Enter twice should create a visible blank line between the two
  paragraphs. The blank line should not be collapsed away.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - visible_blank_line_between_paragraphs: true
    - blank_line_not_collapsed: true
    - no_raw_markdown_markers: true
