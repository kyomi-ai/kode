name: "Enter right before opening backtick of inline code"
scenario: "75-enter-before-inline-code-backtick"
editor: wysiwyg
tags: [enter, inline-code, formatting-boundary, adversarial, newline]
description: >
  Pressing Enter right before the opening backtick of inline code should
  move the inline code to the new line with formatting intact.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - inline_code_intact_on_new_line: true
    - no_raw_markdown_markers: true
    - no_visual_artifacts: true
