name: "Enter inside blockquote — continues blockquote on new line"
scenario: "58-enter-in-blockquote"
editor: wysiwyg
tags: [enter, blockquote, newline]
description: >
  Pressing Enter inside a blockquote should continue the blockquote on a new
  line, keeping the blockquote styling (left border) on the new content.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - blockquote_continues_on_new_line: true
    - blockquote_has_left_border: true
    - no_raw_markdown_markers: true
