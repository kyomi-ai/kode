name: "Backspace at start of paragraph — merges with previous paragraph"
scenario: "63-backspace-merges-paragraphs"
editor: wysiwyg
tags: [backspace, merge, paragraph]
description: >
  After creating a new paragraph and pressing Backspace at its start, the
  paragraphs should merge into one with combined text.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - paragraphs_merged: true
    - no_visual_artifacts: true
    - no_raw_markdown_markers: true
