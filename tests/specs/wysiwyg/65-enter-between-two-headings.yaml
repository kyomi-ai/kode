name: "Enter between two headings — creates paragraph, not heading"
scenario: "65-enter-between-two-headings"
editor: wysiwyg
tags: [enter, headings, paragraph, newline]
description: >
  Pressing Enter at the start of a heading to insert content above should
  create a paragraph between the two headings, not another heading.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - inserted_text_is_paragraph_style: true
    - headings_still_present: true
    - no_raw_markdown_markers: true
