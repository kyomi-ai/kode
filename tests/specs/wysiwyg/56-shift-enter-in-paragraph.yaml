name: "Shift+Enter in paragraph — soft break (single newline), not paragraph break"
scenario: "56-shift-enter-in-paragraph"
editor: wysiwyg
tags: [shift-enter, soft-break, paragraph]
description: >
  Shift+Enter should create a soft break (single newline) within the same
  paragraph, with tighter spacing than a full paragraph break.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - soft_break_tighter_than_paragraph_break: true
    - typed_text_visible: true
    - no_raw_markdown_markers: true
