name: "Backspace at start of H2 — should merge with previous block"
scenario: "90-backspace-at-start-of-heading-merges"
editor: wysiwyg
tags: [backspace, headings, merge, adversarial]
description: >
  Pressing Backspace at the very start of an H2 heading should merge it
  with the previous block without corrupting content.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - blocks_merged: true
    - no_visual_artifacts: true
    - no_raw_markdown_markers: true
