name: "Undo/Redo works in WYSIWYG — content reverts and restores"
scenario: "26-undo-redo-wysiwyg"
editor: wysiwyg
tags: [undo, redo, keyboard]
description: >
  After typing text and pressing Ctrl+Z multiple times, the content should
  revert. The editor should not show corrupted or partial content.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - no_visual_artifacts: true
    - content_reverted_after_undo: true
    - no_raw_markdown_markers: true
