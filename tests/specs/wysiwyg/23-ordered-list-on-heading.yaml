name: "Click ordered list button while cursor is on a heading — heading prefix stripped"
scenario: "23-ordered-list-on-heading"
editor: wysiwyg
tags: [toolbar, lists, headings, conversion]
description: >
  Clicking the ordered list toolbar button while on a heading should convert
  the heading to a numbered list item, stripping the heading prefix.

assertions:
  dom:
    elements:
      wysiwyg: true
      toolbar: true
    lists:
      ol: "> 0"

  visual:
    - text_readable: true
    - numbered_list_marker_visible: true
    - content_text_preserved: true
    - no_raw_markdown_markers: true
