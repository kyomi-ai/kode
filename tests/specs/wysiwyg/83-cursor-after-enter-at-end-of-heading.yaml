name: "Enter at end of H1 — cursor should be on new paragraph line, not stuck on heading"
scenario: "83-cursor-after-enter-at-end-of-heading"
editor: wysiwyg
tags: [enter, cursor, headings, positioning, newline]
description: >
  After pressing Enter at the end of an H1 heading, the cursor should move
  to the new paragraph line below, not remain stuck on the heading line.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - cursor_visible_in_screenshot: true
    - cursor_on_new_paragraph_line: true
    - cursor_not_on_heading: true
    - no_visual_artifacts: true
