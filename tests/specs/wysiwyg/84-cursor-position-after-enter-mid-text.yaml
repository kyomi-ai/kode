name: "Enter in middle of text — cursor at start of line 2, type to verify"
scenario: "84-cursor-position-after-enter-mid-text"
editor: wysiwyg
tags: [enter, cursor, positioning, typing, newline]
description: >
  After pressing Enter in the middle of text and then typing, the typed text
  should appear at the start of the second line, verifying cursor position.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - typed_text_on_second_line: true
    - cursor_at_start_of_second_line: true
    - no_raw_markdown_markers: true
