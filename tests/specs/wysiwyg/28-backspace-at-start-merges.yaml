name: "Backspace at start of paragraph merges with previous"
scenario: "28-backspace-at-start-merges"
editor: wysiwyg
tags: [backspace, merge, paragraph]
description: >
  Pressing Backspace at the start of a paragraph should merge it with the
  previous paragraph, combining the text into one block.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - paragraphs_merged: true
    - no_visual_artifacts: true
    - no_raw_markdown_markers: true
