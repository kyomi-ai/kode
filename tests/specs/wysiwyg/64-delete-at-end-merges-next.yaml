name: "Delete at end of paragraph — merges with next paragraph"
scenario: "64-delete-at-end-merges-next"
editor: wysiwyg
tags: [delete, merge, paragraph]
description: >
  Pressing Delete at the end of a paragraph should merge it with the next
  paragraph, combining both texts into one block.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - paragraphs_merged: true
    - no_visual_artifacts: true
    - no_raw_markdown_markers: true
