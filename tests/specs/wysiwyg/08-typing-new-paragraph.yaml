name: "Type text and create new paragraphs"
scenario: "08-typing-new-paragraph"
editor: wysiwyg
tags: [typing, paragraph]
description: >
  After typing a new paragraph at the end of the document, the typed text
  should be visible as a separate paragraph block.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - typed_text_visible: true
    - paragraph_spacing_visible: true
    - no_raw_markdown_markers: true
