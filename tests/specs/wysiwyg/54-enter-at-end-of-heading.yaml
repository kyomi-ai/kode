name: "Enter at end of heading — new paragraph below (not another heading)"
scenario: "54-enter-at-end-of-heading"
editor: wysiwyg
tags: [enter, headings, paragraph, newline]
description: >
  Pressing Enter at the end of a heading should create a new paragraph
  below, not another heading. The new block should use paragraph styling.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - text_readable: true
    - new_block_is_paragraph_not_heading: true
    - cursor_on_new_paragraph: true
    - no_raw_markdown_markers: true
