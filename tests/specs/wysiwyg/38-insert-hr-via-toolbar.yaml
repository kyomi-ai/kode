name: "Click horizontal rule toolbar button — hr inserted"
scenario: "38-insert-hr-via-toolbar"
editor: wysiwyg
tags: [toolbar, horizontal-rule, formatting]
description: >
  Clicking the Horizontal Rule toolbar button should insert a visible
  separator line at the cursor position.

assertions:
  dom:
    elements:
      wysiwyg: true
      toolbar: true

  visual:
    - text_readable: true
    - horizontal_rule_visible: true
    - no_raw_markdown_markers: true
