name: "Toggle blockquote — cursor stays in same text"
scenario: "48-blockquote-toggle-preserves-cursor"
editor: wysiwyg
tags: [cursor, blockquote, toolbar, stability]
description: >
  After toggling blockquote on and off via the toolbar, the cursor should
  remain in the same text position.

assertions:
  dom:
    elements:
      wysiwyg: true
      toolbar: true

  visual:
    - text_readable: true
    - cursor_visible_in_screenshot: true
    - cursor_at_expected_position: true
    - no_raw_markdown_markers: true
