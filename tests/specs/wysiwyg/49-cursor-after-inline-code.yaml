name: "Cursor immediately after inline code — cursor visible, normal height"
scenario: "49-cursor-after-inline-code"
editor: wysiwyg
tags: [cursor, inline-code, positioning]
description: >
  The cursor immediately after an inline code span should be visible and
  have normal text height, not be oversized or mispositioned.

assertions:
  dom:
    elements:
      wysiwyg: true

  visual:
    - cursor_visible_in_screenshot: true
    - cursor_height_matches_text: true
    - cursor_not_overlapping_code: true
    - no_visual_artifacts: true
