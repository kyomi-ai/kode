name: "Editor with no content — empty state"
scenario: "09-empty-editor"
editor: code
tags: [empty, edge-case]
description: >
  An empty editor should render cleanly with no text content, no visual
  artifacts, and a properly visible editor container.

assertions:
  dom:
    elements:
      editor: true
    text_content_empty: true

  visual:
    - no_visual_artifacts: true
    - editor_container_visible: true
    - no_stale_content: true
